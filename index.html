<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="書庫">
<meta name="theme-color" content="#f5f0e8">
<title>書庫</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --bg2: #ede8df; --surface: #faf7f2; --border: #ddd6c8;
    --text: #2c2416; --text2: #7a6e5f; --text3: #b0a898;
    --accent: #8b5e3c; --reading: #4a7c59; --toread: #6b7fa3; --finished: #8b5e3c;
    --star: #c4956a;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Lato','Hiragino Sans','ヒラギノ角ゴ ProN','Yu Gothic',sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

  /* TOP BAR */
  .topbar { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: calc(var(--safe-top) + 12px) 20px 0; border-bottom: 1px solid var(--border); }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
  .app-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; letter-spacing: 0.04em; }
  .app-title span { font-style: italic; color: var(--accent); }
  .add-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(139,94,60,0.3); transition: transform 0.15s; }
  .add-btn:active { transform: scale(0.93); }

  /* TABS */
  .tabs { display: flex; gap: 6px; padding: 0 0 12px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'Lato',sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: all 0.18s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .content { padding: 16px 12px calc(80px + var(--safe-bottom)); }

  /* BOOK GRID */
  .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .book-card { aspect-ratio: 2/3; border-radius: 6px; overflow: hidden; position: relative; box-shadow: 0 3px 10px rgba(44,36,22,0.15), 2px 0 0 rgba(0,0,0,0.08) inset; cursor: pointer; transition: transform 0.18s; background: var(--bg2); }
  .book-card:active { transform: scale(0.96); }
  /* smart cover fit — JS sets class 'fit-contain' or 'fit-cover' */
  .book-card img { width: 100%; height: 100%; display: block; }
  .book-card img.fit-cover { object-fit: cover; object-position: top; }
  .book-card img.fit-contain { object-fit: contain; background: var(--bg2); }
  .book-card .no-cover { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; background: linear-gradient(135deg, var(--bg2) 0%, var(--border) 100%); gap: 6px; }
  .book-card .no-cover-icon { font-size: 28px; opacity: 0.4; }
  .book-card .no-cover-title { font-size: 10px; text-align: center; color: var(--text2); line-height: 1.4; word-break: break-all; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
  .status-dot { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.8); }
  .status-dot.reading { background: var(--reading); }
  .status-dot.toread { background: var(--toread); }
  .status-dot.finished { background: var(--finished); }
  .card-stars { position: absolute; bottom: 4px; left: 5px; font-size: 9px; line-height: 1; color: var(--star); text-shadow: 0 1px 3px rgba(0,0,0,0.5); letter-spacing: -0.5px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 18px; font-weight: 400; margin-bottom: 8px; color: var(--text2); font-family: 'Cormorant Garamond',serif; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* CALENDAR */
  #calContent { padding: 16px 12px calc(80px + var(--safe-bottom)); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
  .cal-month { font-family: 'Cormorant Garamond',serif; font-size: 24px; font-weight: 600; font-style: italic; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--text3); padding-bottom: 6px; font-family: 'Lato',sans-serif; font-weight: 700; letter-spacing: 0.06em; }
  .cal-cell { border-radius: 5px; overflow: hidden; position: relative; background: var(--bg2); }
  .cal-cell .cell-num { position: absolute; top: 3px; left: 4px; font-size: 10px; color: var(--text3); z-index: 2; line-height: 1; font-family: 'Lato',sans-serif; font-weight: 700; }
  .cal-cell.today .cell-num { color: var(--accent); }
  .cal-cell.empty { background: transparent; }
  .cal-cell .cover-fill { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cal-cell .cover-half { position: absolute; top: 0; height: 100%; width: 50%; object-fit: cover; }
  .cal-cell .cover-half.left { left: 0; } .cal-cell .cover-half.right { right: 0; }
  .cal-cell .cover-quad { position: absolute; width: 50%; height: 50%; object-fit: cover; }
  .cal-cell .cover-quad.tl { top:0;left:0; } .cal-cell .cover-quad.tr { top:0;right:0; }
  .cal-cell .cover-quad.bl { bottom:0;left:0; } .cal-cell .cover-quad.br { bottom:0;right:0; }
  .cal-cell .more-badge { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; font-size: 8px; padding: 1px 3px; border-radius: 3px; z-index: 3; }
  .wnum { color: white !important; text-shadow: 0 1px 3px rgba(0,0,0,0.7); }

  /* SETTINGS */
  #settingsContent { padding: 20px 20px calc(80px + var(--safe-bottom)); display: none; }
  .settings-title { font-family: 'Cormorant Garamond',serif; font-size: 22px; font-weight: 600; margin-bottom: 24px; }
  .settings-section { margin-bottom: 28px; }
  .settings-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 10px; display: block; }
  .settings-divider { height: 1px; background: var(--border); margin: 4px 0 28px; }
  .settings-info { font-size: 12px; color: var(--text3); line-height: 1.7; padding: 14px; background: var(--bg2); border-radius: 10px; }
  .export-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: white; border: none; font-family: 'Lato',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; gap: 3px; font-family: 'Lato',sans-serif; font-weight: 700; letter-spacing: 0.04em; transition: color 0.15s; }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 22px; line-height: 1; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(44,36,22,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { width: 100%; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 20px calc(20px + var(--safe-bottom)); max-height: 92dvh; overflow-y: auto; animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Cormorant Garamond',serif; font-size: 22px; font-weight: 600; margin-bottom: 20px; }

  /* SEARCH */
  .search-bar { display: flex; gap: 8px; margin-bottom: 8px; }
  .search-input { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato','Hiragino Sans',sans-serif; font-size: 15px; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-btn { padding: 11px 18px; border-radius: 10px; background: var(--accent); color: white; border: none; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; font-family: 'Lato',sans-serif; white-space: nowrap; }
  .search-results { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; margin-bottom: 12px; }
  .result-item { display: flex; gap: 12px; padding: 10px; border-radius: 10px; background: var(--bg); border: 1.5px solid transparent; cursor: pointer; align-items: center; }
  .result-item:active { border-color: var(--accent); background: #fdf6f0; }
  .result-cover { width: 48px; height: 68px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--bg2); }
  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: 14px; font-weight: 700; margin-bottom: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
  .result-author { font-size: 12px; color: var(--text2); }
  .divider-or { text-align: center; font-size: 11px; color: var(--text3); margin: 8px 0; letter-spacing: 0.1em; }
  .manual-btn { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px dashed var(--border); background: transparent; color: var(--text2); font-family: 'Lato',sans-serif; font-size: 13px; cursor: pointer; margin-bottom: 10px; }
  /* ASIN input row */
  .asin-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .asin-input { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato',monospace; font-size: 14px; color: var(--text); outline: none; letter-spacing: 0.04em; }
  .asin-input:focus { border-color: var(--accent); }
  .asin-input::placeholder { color: var(--text3); letter-spacing: 0; font-family: 'Lato',sans-serif; }
  .asin-btn { padding: 11px 16px; border-radius: 10px; background: var(--bg2); border: 1.5px solid var(--border); color: var(--text2); font-family: 'Lato',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

  /* FORM */
  .form-section { margin-bottom: 20px; }
  .form-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 7px; display: block; font-family: 'Lato',sans-serif; }
  .form-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato','Hiragino Sans',sans-serif; font-size: 15px; color: var(--text); outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .cover-preview-wrap { display: flex; align-items: center; gap: 12px; }
  .cover-preview { width: 60px; height: 84px; border-radius: 6px; object-fit: cover; background: var(--bg2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.4; }
  .cover-url-input { flex: 1; padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato',sans-serif; font-size: 12px; color: var(--text); outline: none; }
  .cover-url-input:focus { border-color: var(--accent); }

  /* STATUS */
  .status-picker { display: flex; gap: 8px; }
  .status-option { flex: 1; padding: 10px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: transparent; font-family: 'Lato',sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; color: var(--text2); transition: all 0.15s; }
  .status-option.active-toread { border-color: var(--toread); background: #eef0f7; color: var(--toread); }
  .status-option.active-reading { border-color: var(--reading); background: #eef4f0; color: var(--reading); }
  .status-option.active-finished { border-color: var(--finished); background: #fdf3ee; color: var(--finished); }

  /* HALF-STAR RATING */
  .star-picker { display: flex; align-items: center; gap: 2px; }
  .star-wrap { position: relative; width: 36px; height: 36px; cursor: pointer; flex-shrink: 0; }
  .star-wrap .star-base { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--border); line-height: 1; user-select: none; }
  .star-wrap .star-fill { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--star); line-height: 1; overflow: hidden; width: 0%; transition: width 0.1s; user-select: none; }
  .star-clear { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; font-family: 'Lato',sans-serif; text-decoration: underline; margin-left: 4px; }

  /* TAGS */
  .tag-input-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
  .tag-input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato','Hiragino Sans',sans-serif; font-size: 14px; color: var(--text); outline: none; }
  .tag-input:focus { border-color: var(--accent); }
  .tag-add-btn { padding: 9px 14px; border-radius: 10px; background: var(--bg2); border: 1.5px solid var(--border); color: var(--text2); font-size: 20px; cursor: pointer; line-height: 1; }
  .tags-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 4px; }
  .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; background: var(--bg2); border: 1px solid var(--border); font-size: 12px; color: var(--text2); font-family: 'Lato',sans-serif; }
  .tag-chip button { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 0; line-height: 1; }

  /* DATES */
  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .date-field label { display: block; font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 4px; font-family: 'Lato',sans-serif; letter-spacing: 0.06em; }
  .date-field input { width: 100%; padding: 9px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Lato',sans-serif; font-size: 13px; color: var(--text); outline: none; }

  /* BUTTONS */
  .save-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--accent); color: white; border: none; font-family: 'Lato',sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.06em; box-shadow: 0 4px 12px rgba(139,94,60,0.3); }
  .delete-btn { width: 100%; padding: 13px; border-radius: 12px; background: transparent; color: #c0392b; border: 1.5px solid #e8c4c0; font-family: 'Lato',sans-serif; font-size: 14px; cursor: pointer; margin-top: 10px; }

  /* DETAIL */
  .detail-cover-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
  .detail-cover { width: 120px; height: 168px; border-radius: 8px; object-fit: cover; box-shadow: 0 8px 24px rgba(44,36,22,0.2), 3px 0 0 rgba(0,0,0,0.1); background: var(--bg2); }
  .detail-title { font-family: 'Cormorant Garamond',serif; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; line-height: 1.3; }
  .detail-author { text-align: center; color: var(--text2); font-size: 14px; margin-bottom: 10px; }
  .detail-rating { text-align: center; font-size: 22px; color: var(--star); margin-bottom: 10px; min-height: 10px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .detail-tag { padding: 3px 10px; border-radius: 20px; background: var(--bg2); border: 1px solid var(--border); font-size: 12px; color: var(--text2); font-family: 'Lato',sans-serif; }
  .detail-status { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 16px; font-family: 'Lato',sans-serif; }
  .detail-status.reading { background: #eef4f0; color: var(--reading); }
  .detail-status.toread { background: #eef0f7; color: var(--toread); }
  .detail-status.finished { background: #fdf3ee; color: var(--finished); }
  .detail-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .detail-date-box { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
  .detail-date-box .dlabel { font-size: 10px; font-weight: 700; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.06em; font-family: 'Lato',sans-serif; }
  .detail-date-box .dval { font-size: 16px; color: var(--text); font-family: 'Cormorant Garamond',serif; }
  .edit-btn { width: 100%; padding: 13px; border-radius: 12px; background: var(--bg2); color: var(--text); border: 1.5px solid var(--border); font-family: 'Lato',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }

  .spinner { text-align: center; padding: 20px; color: var(--text3); font-size: 14px; }
  .toast { position: fixed; bottom: calc(80px + var(--safe-bottom) + 10px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 300; font-family: 'Lato',sans-serif; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-inner">
    <div class="app-title">My <span>Library</span></div>
    <button class="add-btn" id="addBtnTop" onclick="openAddModal()">＋</button>
  </div>
  <div class="tabs" id="tabsBar">
    <button class="tab active" onclick="setFilter('all',this)">ALL</button>
    <button class="tab" onclick="setFilter('reading',this)">READING</button>
    <button class="tab" onclick="setFilter('toread',this)">TO READ</button>
    <button class="tab" onclick="setFilter('finished',this)">FINISHED</button>
  </div>
</div>

<div class="content" id="libContent"><div id="libInner"></div></div>

<div id="calContent" style="display:none">
  <div class="cal-header">
    <div class="cal-month" id="calMonth"></div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div id="settingsContent">
  <div class="settings-title">Settings</div>
  <div class="settings-section">
    <span class="settings-label">DATA</span>
    <button class="export-btn" onclick="exportCSV()">⬇ Export Library as CSV</button>
  </div>
  <div class="settings-divider"></div>
  <div class="settings-section">
    <span class="settings-label">ABOUT</span>
    <div class="settings-info">
      All book data is stored locally on your device.<br>
      Cover source: Google Books API (zoom=0 high-res).<br>
      Amazon covers: enter ASIN when adding a book.
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" id="navLibrary" onclick="switchView('library')"><span class="nav-icon">📚</span><span>Library</span></button>
  <button class="nav-item" id="navCalendar" onclick="switchView('calendar')"><span class="nav-icon">📅</span><span>Calendar</span></button>
  <button class="nav-item" id="navSettings" onclick="switchView('settings')"><span class="nav-icon">⚙️</span><span>Settings</span></button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Book</div>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="書名 / タイトル / Title…" onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="searchResults" class="search-results"></div>
    <div class="divider-or">— OR —</div>
    <button class="manual-btn" onclick="openEditModal(null,true)">✏️ Manual Entry</button>
    <div class="asin-row">
      <input type="text" class="asin-input" id="asinInput" placeholder="Amazon ASIN (e.g. B0FWQDGMZB)" maxlength="10">
      <button class="asin-btn" onclick="useAsin()">Use ASIN</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editModalTitle">New Book</div>
    <div class="form-section">
      <label class="form-label">COVER</label>
      <div class="cover-preview-wrap">
        <div id="coverPreviewBox" class="cover-preview">📖</div>
        <input type="text" class="cover-url-input" id="coverUrlInput" placeholder="Cover image URL" oninput="updateCoverPreview()">
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">TITLE</label>
      <input type="text" class="form-input" id="titleInput" placeholder="Title">
    </div>
    <div class="form-section">
      <label class="form-label">AUTHOR</label>
      <input type="text" class="form-input" id="authorInput" placeholder="Author">
    </div>
    <div class="form-section">
      <label class="form-label">STATUS</label>
      <div class="status-picker">
        <button class="status-option" id="s-toread" onclick="setStatus('toread')">🔖 To Read</button>
        <button class="status-option" id="s-reading" onclick="setStatus('reading')">📖 Reading</button>
        <button class="status-option" id="s-finished" onclick="setStatus('finished')">✅ Finished</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">RATING</label>
      <div class="star-picker" id="starPicker">
        <!-- built by JS -->
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">TAGS</label>
      <div class="tag-input-wrap">
        <input type="text" class="tag-input" id="tagInput" placeholder="輕小説、推理、favorites…" onkeydown="if(event.key==='Enter') addTag()">
        <button class="tag-add-btn" onclick="addTag()">＋</button>
      </div>
      <div class="tags-list" id="tagsList"></div>
    </div>
    <div class="form-section">
      <label class="form-label">DATES</label>
      <div class="date-row">
        <div class="date-field"><label>STARTED</label><input type="date" id="startDateInput"></div>
        <div class="date-field"><label>FINISHED</label><input type="date" id="endDateInput"></div>
      </div>
    </div>
    <button class="save-btn" onclick="saveBook()">Save</button>
    <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteBook()">Delete this book</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="detail-cover-wrap"><img id="detailCover" class="detail-cover" src="" alt="" style="display:none"></div>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-author" id="detailAuthor"></div>
    <div class="detail-rating" id="detailRating"></div>
    <div class="detail-tags" id="detailTags"></div>
    <div class="detail-status" id="detailStatus"></div>
    <div class="detail-dates">
      <div class="detail-date-box"><div class="dlabel">STARTED</div><div class="dval" id="detailStart">—</div></div>
      <div class="detail-date-box"><div class="dlabel">FINISHED</div><div class="dval" id="detailEnd">—</div></div>
    </div>
    <button class="edit-btn" onclick="editCurrentBook()">✏️ Edit</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let books = JSON.parse(localStorage.getItem('myLibraryBooks_v2') || '[]');
let currentFilter = 'all', currentView = 'library';
let calYear, calMonth, editingId = null, currentDetailId = null;
let editRating = 0, editTags = [], editStatus = 'toread';
const today = new Date();
calYear = today.getFullYear(); calMonth = today.getMonth();

function saveData() { localStorage.setItem('myLibraryBooks_v2', JSON.stringify(books)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── VIEWS ──
function switchView(v) {
  currentView = v;
  document.getElementById('libContent').style.display = v==='library' ? '' : 'none';
  document.getElementById('calContent').style.display = v==='calendar' ? '' : 'none';
  document.getElementById('settingsContent').style.display = v==='settings' ? 'block' : 'none';
  document.getElementById('tabsBar').style.display = v==='library' ? '' : 'none';
  document.getElementById('addBtnTop').style.display = v==='library' ? '' : 'none';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(v==='library'?'navLibrary':v==='calendar'?'navCalendar':'navSettings').classList.add('active');
  if (v==='calendar') renderCalendar();
  else renderBooks();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBooks();
}

// ── SMART COVER FIT ──
// Detect image natural ratio; if close to 2:3 → cover, else → contain
function applySmartFit(img) {
  const onLoad = () => {
    const ratio = img.naturalWidth / img.naturalHeight;
    // 2:3 = 0.667; allow tolerance ±0.15
    img.className = (ratio < 0.82) ? 'fit-cover' : 'fit-contain';
  };
  if (img.complete && img.naturalWidth) onLoad();
  else img.addEventListener('load', onLoad);
}

// ── RENDER BOOKS ──
function renderBooks() {
  const c = document.getElementById('libInner');
  const filtered = currentFilter==='all' ? books : books.filter(b => b.status===currentFilter);
  if (!filtered.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><h3>${currentFilter==='all'?'Your library is empty':'No books here yet'}</h3><p>Tap ＋ to add your first book</p></div>`;
    return;
  }
  c.innerHTML = '<div class="book-grid" id="bookGrid"></div>';
  const grid = document.getElementById('bookGrid');
  filtered.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.onclick = () => openDetail(book.id);
    if (book.coverUrl) {
      const img = document.createElement('img');
      img.src = book.coverUrl;
      img.alt = book.title;
      img.className = 'fit-cover'; // default
      img.onerror = () => { img.style.display='none'; fallback.style.display='flex'; };
      applySmartFit(img);
      const fallback = document.createElement('div');
      fallback.className = 'no-cover';
      fallback.style.display = 'none';
      fallback.innerHTML = `<div class="no-cover-icon">📖</div><div class="no-cover-title">${book.title}</div>`;
      card.appendChild(img);
      card.appendChild(fallback);
    } else {
      card.innerHTML = `<div class="no-cover"><div class="no-cover-icon">📖</div><div class="no-cover-title">${book.title}</div></div>`;
    }
    const dot = document.createElement('div');
    dot.className = `status-dot ${book.status}`;
    card.appendChild(dot);
    if (book.rating) {
      const stars = document.createElement('div');
      stars.className = 'card-stars';
      stars.textContent = renderStarText(book.rating);
      card.appendChild(stars);
    }
    grid.appendChild(card);
  });
}

// ── HALF STAR HELPERS ──
function renderStarText(rating) {
  // rating is 0.5–5 in 0.5 steps
  let s = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) s += '★';
    else if (rating >= i - 0.5) s += '⯨'; // half star unicode (fallback ½★)
    else s += '☆';
  }
  return s;
}

function buildStarPicker() {
  const wrap = document.getElementById('starPicker');
  wrap.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const sw = document.createElement('div');
    sw.className = 'star-wrap';
    sw.innerHTML = `<div class="star-base">★</div><div class="star-fill" id="sf${i}">★</div>`;
    // left half = i-0.5, right half = i
    sw.addEventListener('click', e => {
      const rect = sw.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const half = x < rect.width / 2;
      setRating(half ? i - 0.5 : i);
    });
    wrap.appendChild(sw);
  }
  const clr = document.createElement('button');
  clr.className = 'star-clear';
  clr.textContent = 'clear';
  clr.onclick = () => setRating(0);
  wrap.appendChild(clr);
}

function setRating(r) {
  editRating = r;
  updateStarPicker();
}

function updateStarPicker() {
  for (let i = 1; i <= 5; i++) {
    const sf = document.getElementById('sf'+i);
    if (!sf) continue;
    if (editRating >= i) sf.style.width = '100%';
    else if (editRating >= i - 0.5) sf.style.width = '50%';
    else sf.style.width = '0%';
  }
}

// ── CALENDAR ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function changeMonth(d) {
  calMonth += d;
  if (calMonth>11){calMonth=0;calYear++;} if (calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar() {
  document.getElementById('calMonth').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => {
    const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const rows = Math.ceil((firstDay+daysInMonth)/7);
  const finishMap = {};
  books.forEach(b => {
    if (b.status==='finished' && b.endDate) {
      const key = b.endDate.slice(0,10);
      if (!finishMap[key]) finishMap[key]=[];
      finishMap[key].push(b);
    }
  });
  const topbarH = document.getElementById('topbar').offsetHeight;
  const availH = window.innerHeight - topbarH - 52 - 28 - 80 - 34;
  const cellH = Math.max(44, Math.floor(availH / rows));

  for (let i=0;i<firstDay;i++) {
    const el=document.createElement('div'); el.className='cal-cell empty'; el.style.height=cellH+'px'; grid.appendChild(el);
  }
  for (let d=1;d<=daysInMonth;d++) {
    const el=document.createElement('div'); el.className='cal-cell'; el.style.height=cellH+'px';
    const dateKey=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d) el.classList.add('today');
    const dayBooks = finishMap[dateKey]||[];
    const hasCovers = dayBooks.some(b=>b.coverUrl);
    const numCls = hasCovers ? 'cell-num wnum' : 'cell-num';
    if (!dayBooks.length) {
      el.innerHTML=`<span class="cell-num">${d}</span>`;
    } else if (dayBooks.length===1) {
      const b=dayBooks[0];
      el.innerHTML = b.coverUrl ? `<img class="cover-fill" src="${b.coverUrl}" alt=""><span class="${numCls}">${d}</span>` : `<span class="cell-num">${d}</span>`;
    } else if (dayBooks.length===2) {
      let h=''; dayBooks.forEach((b,i)=>{ if(b.coverUrl) h+=`<img class="cover-half ${i===0?'left':'right'}" src="${b.coverUrl}" alt="">`; });
      h+=`<span class="${numCls}">${d}</span>`; el.innerHTML=h;
    } else {
      const pos=['tl','tr','bl','br']; let h='';
      dayBooks.slice(0,4).forEach((b,i)=>{ if(b.coverUrl) h+=`<img class="cover-quad ${pos[i]}" src="${b.coverUrl}" alt="">`; });
      h+=`<span class="${numCls}">${d}</span>`;
      if (dayBooks.length>4) h+=`<span class="more-badge">+${dayBooks.length-4}</span>`;
      el.innerHTML=h;
    }
    el.onclick=()=>{ if(dayBooks.length===1) openDetail(dayBooks[0].id); };
    grid.appendChild(el);
  }
}

// ── ADD MODAL ──
function openAddModal() {
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
  document.getElementById('asinInput').value='';
  document.getElementById('addModal').classList.add('open');
}

// ── ASIN ──
function useAsin() {
  const raw = document.getElementById('asinInput').value.trim().toUpperCase();
  // Accept bare ASIN or full Amazon URL
  const match = raw.match(/([A-Z0-9]{10})/);
  if (!match) { showToast('Invalid ASIN'); return; }
  const asin = match[1];
  const coverUrl = `https://m.media-amazon.com/images/P/${asin}.01.MAIN._SCRM_.jpg`;
  closeModal('addModal');
  openEditModal({ coverUrl }, true);
}

// ── SEARCH (Google Books only) ──
const GBOOKS_KEY = 'AIzaSyDLk80bMnLdeMuwrZLhwW4f4N1PxEJxFhg';
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const res = document.getElementById('searchResults');
  res.innerHTML = '<div class="spinner">Searching…</div>';
  try {
    const results = await searchGoogle(q);
    if (!results.length) { res.innerHTML='<div class="spinner">No results. Try another keyword.</div>'; return; }
    res.innerHTML='';
    results.forEach(item => {
      const div = document.createElement('div'); div.className='result-item';
      div.innerHTML=`
        ${item.cover ? `<img class="result-cover" src="${item.cover}" alt="" onerror="this.style.display='none'">` : '<div class="result-cover" style="display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.3">📖</div>'}
        <div class="result-info"><div class="result-title">${item.title}</div><div class="result-author">${item.author||''}</div></div>`;
      div.onclick=()=>{ closeModal('addModal'); openEditModal({title:item.title,author:item.author,coverUrl:item.cover},true); };
      res.appendChild(div);
    });
  } catch(e) { res.innerHTML='<div class="spinner">Search failed. Please try again.</div>'; }
}

async function searchGoogle(query) {
  const results=[], seen=new Set();
  async function fetchG(params) {
    try {
      const r=await fetch(`https://www.googleapis.com/books/v1/volumes?${params}&maxResults=10&printType=books&key=${GBOOKS_KEY}`);
      const data=await r.json();
      (data.items||[]).forEach(item=>{
        const vi=item.volumeInfo||{};
        const title=vi.title||'';
        if (!title||seen.has(title)) return;
        seen.add(title);
        const links=vi.imageLinks||{};
        const raw=links.extraLarge||links.large||links.medium||links.small||links.thumbnail||links.smallThumbnail||'';
        const cover=raw ? raw.replace('http:','https:').replace('&edge=curl','').replace(/zoom=\d/,'zoom=0') : null;
        results.push({title, author:(vi.authors||[]).join('、'), cover});
      });
    } catch(e){}
  }
  await fetchG(`q=${encodeURIComponent(query)}`);
  if (results.length<5) await fetchG(`q=${encodeURIComponent(query)}&langRestrict=ja`);
  if (results.length<5) await fetchG(`q=${encodeURIComponent(query)}&langRestrict=zh`);
  return results.slice(0,12);
}

// ── CSV EXPORT ──
function exportCSV() {
  if (!books.length) { showToast('No books to export'); return; }
  const headers = ['Title','Author','Status','Rating','Tags','Started','Finished','Cover URL'];
  const rows = books.map(b => [
    b.title, b.author||'', b.status, b.rating||'',
    (b.tags||[]).join(';'), b.startDate||'', b.endDate||'', b.coverUrl||''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tsundoku_${today.toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Exported ✓');
}

// ── EDIT MODAL ──
function openEditModal(prefill, isNew) {
  editingId = isNew&&!prefill?.id ? null : (prefill?.id||null);
  editStatus = prefill?.status||'toread';
  editRating = prefill?.rating||0;
  editTags = [...(prefill?.tags||[])];
  document.getElementById('editModalTitle').textContent = editingId ? 'Edit Book' : 'New Book';
  document.getElementById('titleInput').value = prefill?.title||'';
  document.getElementById('authorInput').value = prefill?.author||'';
  document.getElementById('coverUrlInput').value = prefill?.coverUrl||'';
  document.getElementById('startDateInput').value = prefill?.startDate||'';
  document.getElementById('endDateInput').value = prefill?.endDate||'';
  document.getElementById('tagInput').value = '';
  document.getElementById('deleteBtn').style.display = editingId ? '' : 'none';
  buildStarPicker(); updateCoverPreview(); updateStatusPicker(); updateStarPicker(); renderTagsList();
  closeModal('addModal'); closeModal('detailModal');
  document.getElementById('editModal').classList.add('open');
}

function updateCoverPreview() {
  const url=document.getElementById('coverUrlInput').value.trim();
  const box=document.getElementById('coverPreviewBox');
  if (url) {
    box.outerHTML=`<img id="coverPreviewBox" class="cover-preview" src="${url}" alt="" onerror="this.outerHTML='<div id=coverPreviewBox class=cover-preview>📖</div>'">`;
  } else {
    const el=document.getElementById('coverPreviewBox');
    if (el&&el.tagName==='IMG') el.outerHTML='<div id="coverPreviewBox" class="cover-preview">📖</div>';
  }
}

function setStatus(s){ editStatus=s; updateStatusPicker(); }
function updateStatusPicker(){
  ['toread','reading','finished'].forEach(s=>{
    document.getElementById('s-'+s).className='status-option'+(editStatus===s?' active-'+s:'');
  });
}
function addTag(){
  const input=document.getElementById('tagInput');
  const val=input.value.trim();
  if (!val||editTags.includes(val)){input.value='';return;}
  editTags.push(val); input.value=''; renderTagsList();
}
function removeTag(t){ editTags=editTags.filter(x=>x!==t); renderTagsList(); }
function renderTagsList(){
  document.getElementById('tagsList').innerHTML=editTags.map(t=>
    `<span class="tag-chip">${t}<button onclick="removeTag('${t.replace(/'/g,"\\'")}')">×</button></span>`
  ).join('');
}
function saveBook(){
  const title=document.getElementById('titleInput').value.trim();
  if (!title){showToast('Please enter a title');return;}
  const book={
    id: editingId||genId(), title,
    author: document.getElementById('authorInput').value.trim(),
    coverUrl: document.getElementById('coverUrlInput').value.trim(),
    status: editStatus, rating: editRating, tags:[...editTags],
    startDate: document.getElementById('startDateInput').value||'',
    endDate: document.getElementById('endDateInput').value||'',
  };
  if (editingId){ const idx=books.findIndex(b=>b.id===editingId); if(idx!==-1) books[idx]=book; }
  else books.unshift(book);
  saveData(); closeModal('editModal'); renderBooks();
  showToast(editingId?'Updated ✓':'Added to library ✓');
}
function deleteBook(){
  if (!editingId) return;
  if (!confirm('Delete this book?')) return;
  books=books.filter(b=>b.id!==editingId);
  saveData(); closeModal('editModal'); renderBooks(); showToast('Deleted');
}

// ── DETAIL ──
function renderDetailRating(rating) {
  if (!rating) return '';
  let s = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) s += '★';
    else if (rating >= i - 0.5) s += '⯨';
    else s += '☆';
  }
  return s;
}

function openDetail(id){
  const book=books.find(b=>b.id===id); if(!book) return;
  currentDetailId=id;
  const coverEl=document.getElementById('detailCover');
  if(book.coverUrl){coverEl.src=book.coverUrl;coverEl.style.display='';}
  else{coverEl.src='';coverEl.style.display='none';}
  document.getElementById('detailTitle').textContent=book.title;
  document.getElementById('detailAuthor').textContent=book.author||'';
  document.getElementById('detailRating').textContent=renderDetailRating(book.rating);
  document.getElementById('detailTags').innerHTML=(book.tags||[]).map(t=>`<span class="detail-tag">${t}</span>`).join('');
  const statusMap={toread:['🔖 To Read','toread'],reading:['📖 Reading','reading'],finished:['✅ Finished','finished']};
  const [label,cls]=statusMap[book.status]||statusMap.toread;
  const se=document.getElementById('detailStatus'); se.textContent=label; se.className='detail-status '+cls;
  document.getElementById('detailStart').textContent=book.startDate?formatDate(book.startDate):'—';
  document.getElementById('detailEnd').textContent=book.endDate?formatDate(book.endDate):'—';
  document.getElementById('detailModal').classList.add('open');
}
function editCurrentBook(){ const b=books.find(b=>b.id===currentDetailId); if(b) openEditModal(b,false); }
function formatDate(d){ if(!d)return'—'; const[y,m,day]=d.split('-'); return`${m}/${day}/${y.slice(2)}`; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});

renderBooks();
</script>
